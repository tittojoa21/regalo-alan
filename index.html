<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>⚠️ Advertencia · Cumple Especial</title>
  <link rel="stylesheet" href="advertencia.css">
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Partículas flotantes sutiles -->
  <div class="floating-particles">
    <div class="particle" style="--x: 10%; --y: 20%; --delay: 0s;">💚</div>
    <div class="particle" style="--x: 85%; --y: 30%; --delay: 2s;">💜</div>
    <div class="particle" style="--x: 20%; --y: 75%; --delay: 4s;">🤍</div>
    <div class="particle" style="--x: 75%; --y: 70%; --delay: 1s;">💚</div>
  </div>

  <!-- Auras de luz sutiles -->
  <div class="light-aura aura-1"></div>
  <div class="light-aura aura-2"></div>

  <!-- Contenedor principal centrado -->
  <div class="container">
    <div class="advertencia-card">
      <!-- Sello de advertencia estático pero con brillo -->
      <div class="warning-seal">
        <div class="seal-icon">⚠️</div>
        <div class="seal-glow"></div>
      </div>
      
      <h1 class="advertencia-titulo">
        <span class="titulo-line">¡ALTO AHÍ!</span>
      </h1>
      
      <div class="advertencia-contenido">
        <p class="mensaje-principal">
          Esta página puede provocar:
        </p>
        
        <div class="efectos-container">
          <div class="efecto-item">
            <div class="efecto-icon">😊</div>
            <div class="efecto-texto">
              <span class="efecto-titulo">Sonrisas involuntarias</span>
            </div>
          </div>
          
          <div class="efecto-item">
            <div class="efecto-icon">💭</div>
            <div class="efecto-texto">
              <span class="efecto-titulo">Ganas de pensar en mí</span>
            </div>
          </div>
          
          <div class="efecto-item">
            <div class="efecto-icon">🎂</div>
            <div class="efecto-texto">
              <span class="efecto-titulo">Sospecha de un cumple diferente</span>
            </div>
          </div>
        </div>
        
        <div class="advertencia-footer">
          <p class="texto-continuar">
            <span class="continua-palabra">Continúa,</span>
            <span class="advertido-palabra">pero fuiste advertido...</span>
          </p>
          
          <a href="tarjetas.html" class="boton-elijo-continuar" id="btnContinuar">
            <span class="boton-texto">ELIJO CONTINUAR</span>
            <span class="boton-icono">→</span>
          </a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
