<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Nuestra Historia · Tarjetas</title>
  <link rel="stylesheet" href="tarjetas.css">
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
  <!-- Barra de progreso con brillo -->
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill"></div>
    <div class="progress-glow"></div>
  </div>

  <!-- Contador de tarjetas con estilo -->
  <div class="card-counter" id="cardCounter">1/15</div>

  <!-- Contenedor principal de tarjetas -->
  <div class="cards-container" id="cardsContainer"></div>

  <!-- Indicador táctil con animación -->
  <div class="swipe-hint" id="swipeHint">
    <i class="fas fa-chevron-left"></i>
    <span>desliza para descubrir</span>
    <i class="fas fa-chevron-right"></i>
  </div>

  <!-- Botón reiniciar con efecto -->
  <button class="btn-reiniciar" id="btnReiniciar">
    <i class="fas fa-redo-alt"></i>
    <span>Volver a empezar</span>
  </button>

  <script src="tarjetas.js" defer></script>
</body>
</html>
